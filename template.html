    <script>
    // Populate data cascade elements with pseudo data
    document.addEventListener('DOMContentLoaded', function() {
      // Only run if pseudoData function is available (not during build process)
      if (typeof pseudoData === 'function') {
        const dcElements = document.querySelectorAll('[class^="dc"]');
        dcElements.forEach(function(element) {
          element.textContent = pseudoData();
        });
      }
    });
    </script>
    
    <script>
    // Template-specific markdown processing function
    // This can be overridden in local templates for different behavior
    function processMarkdownContent(content) {
      // Convert underlines to go-yellow spans
      content = content.replace(/__([^_]+)__/g, '<span class="go-yellow">$1</span>');
      
      // Replace ### headings with LCARS text bars
      content = content.replace(/^### (.+)$/gm, '<div class="lcars-text-bar"><span>$1</span></div>');
      
      // Process grid blocks
      content = content.replace(/```grid\n([\s\S]*?)\n```/g, (match, tableContent) => {
        const lines = tableContent.trim().split('\n').filter(line => line.trim());
        const gridItems = [];
        
        lines.forEach(line => {
          const cells = line.split('|').filter(cell => cell.trim()).map(cell => cell.trim());
          cells.forEach(cell => {
            if (cell.includes('![') && cell.includes('](')) {
              const imgMatch = cell.match(/!\[([^\]]*)\]\(([^)]+)\)/);
              if (imgMatch) {
                const alt = imgMatch[1];
                const src = imgMatch[2];
                // Check if src ends with / (directory path)
                if (src.endsWith('/')) {
                  gridItems.push(`<a class="col" href="${src}index.html">
        <img class="pics" src="${src}/media/videos/Hero.png" alt="${alt}" />
        <p class="caption">${alt}</p>
      </a>`);
                }
              }
            } else if (cell.includes('[') && cell.includes('](')) {
              // Handle text links like [Resume](resume/)
              const linkMatch = cell.match(/\[([^\]]*)\]\(([^)]+)\)/);
              if (linkMatch) {
                const text = linkMatch[1];
                const href = linkMatch[2];
                if (href.endsWith('/')) {
                  gridItems.push(`<a class="col" href="${href}index.html">
        <p class="caption">${text}</p>
      </a>`);
                } else {
                  gridItems.push(`<a class="col" href="${href}">
        <p class="caption">${text}</p>
      </a>`);
                }
              }
            }
          });
        });
        
        return `<div class="grid">
      ${gridItems.join('\n      ')}
    </div>`;
      });
      
      // Process software-icons blocks  
      content = content.replace(/```software-icons\n([\s\S]*?)\n```/g, (match, tableContent) => {
        const lines = tableContent.trim().split('\n').filter(line => line.trim());
        const iconItems = [];
        
        lines.forEach(line => {
          const cells = line.split('|').filter(cell => cell.trim()).map(cell => cell.trim());
          cells.forEach(cell => {
            if (cell.includes('![') && cell.includes('](')) {
              const imgMatch = cell.match(/!\[([^\]]*)\]\(([^)]+)\)/);
              if (imgMatch) {
                const alt = imgMatch[1];
                const src = imgMatch[2];
                iconItems.push(`<div>
        <img src="${src}" alt="${alt}" title="${alt}" class="pics" />
        <p class="caption">${alt}</p>
      </div>`);
              }
            }
          });
        });
        
        return `<div class="software-icons">
      ${iconItems.join('\n      ')}
    </div>`;
      });
      
      // Convert standard markdown images/videos to HTML with proper classes
      content = content.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
        if (src.endsWith('.webm') || src.endsWith('.mp4')) {
          return `<video loop muted autoplay class="pics" alt="${alt}">
      <source src="${src}" type="video/${src.split('.').pop()}" />
    </video>`;
        } else {
          return `<img class="pics" src="${src}" alt="${alt}" />`;
        }
      });
      
      // Process regular Markdown links to handle directory paths ending with /
      content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, href) => {
        if (href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('http')) {
          // Don't modify external links, email or phone links
          return match;
        } else if (href.endsWith('/')) {
          // Add index.html to directory paths
          return `[${text}](${href}index.html)`;
        } else {
          return match;
        }
      });
      
      return content;
    }
    </script>
    
    <!-- Video Loading Enhancement Script -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('videos');
      if (!video) return;
      
      // Skip video operations during build time (JSDOM environment)
      if (typeof window === 'undefined' || typeof window.location === 'undefined' || 
          window.location.protocol === 'about:') {
        return;
      }
      
      // Force video loading and handle autoplay restrictions
      function initializeVideo() {
        try {
          video.load();
          
          // Try to play the video
          const playPromise = video.play();
          
          if (playPromise !== undefined) {
            playPromise.then(() => {
              console.log('Video autoplay started successfully');
            }).catch(error => {
              console.log('Autoplay prevented, video will start on first user interaction:', error.name);
              
              // Add click handler to start video on user interaction
              const startVideoOnInteraction = function() {
                video.play().then(() => {
                  console.log('Video started after user interaction');
                }).catch(e => {
                  console.log('Video play failed:', e);
                });
                
                // Remove the event listeners after first interaction
                document.removeEventListener('click', startVideoOnInteraction);
                document.removeEventListener('keydown', startVideoOnInteraction);
                document.removeEventListener('touchstart', startVideoOnInteraction);
              };
              
              document.addEventListener('click', startVideoOnInteraction);
              document.addEventListener('keydown', startVideoOnInteraction);
              document.addEventListener('touchstart', startVideoOnInteraction);
            });
          }
        } catch (e) {
          console.log('Video initialization failed:', e);
        }
      }
      
      // Handle video loading errors
      video.addEventListener('error', function(e) {
        console.log('Video error:', e);
        // Try to reload the video after a short delay
        setTimeout(() => {
          try {
            video.load();
          } catch (err) {
            console.log('Video reload failed:', err);
          }
        }, 1000);
      });
      
      // Handle successful loading
      video.addEventListener('loadeddata', function() {
        console.log('Video loaded successfully');
      });
      
      // Handle metadata loading
      video.addEventListener('loadedmetadata', function() {
        console.log('Video metadata loaded');
      });
      
      // Initialize video
      initializeVideo();
      
      // Re-initialize video on page visibility change (fixes back/forward navigation issues)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && video.paused) {
          console.log('Page became visible, restarting video');
          initializeVideo();
        }
      });
      
      // Handle browser back/forward navigation
      window.addEventListener('pageshow', function(event) {
        if (event.persisted && video.paused) {
          console.log('Page restored from cache, restarting video');
          initializeVideo();
        }
      });
    });
    </script>
